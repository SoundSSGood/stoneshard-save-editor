name: Build .NET Framework Project

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Restore NuGet packages
      run: nuget restore StoneshardSaveEditor.csproj

    - name: Build the project
      run: msbuild StoneshardSaveEditor.csproj /p:Configuration=Release /p:Platform="Any CPU" /verbosity:minimal

    - name: List files (for debugging)
      run: dir /s bin\Release

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: StoneshardSaveEditor
        path: |
          bin\Release\*.exe
          bin\Release\*.dll
          bin\Release\*.config

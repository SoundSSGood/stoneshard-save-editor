name: Build .NET Framework Project

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Add msbuild to PATH
      run: |
        $msbuildPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -requires Microsoft.Component.MSBuild -find MSBuild\Current\Bin\MSBuild.exe
        $env:PATH = "$msbuildPath;$env:PATH"
        echo "MSBuild found at: $msbuildPath"

    - name: Build the project
      run: msbuild StoneshardSaveEditor.csproj /p:Configuration=Release /p:Platform="Any CPU"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: StoneshardSaveEditor
        path: bin\Release\
